<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{page.setup.title}">Setup - TableSplit Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/agent.css">
</head>
<body>
    <div class="setup-container">
        <div class="logo-section">
            <div class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
            </div>
            <div class="logo-text">TableSplit Agent</div>
        </div>

        <div class="setup-card">
            <div th:if="${success}" class="alert-info" style="background: #ecfdf5; color: #065f46; border-color: #10b981; margin-bottom: 20px;">
                <span th:text="${success}">Success message</span>
            </div>
            <div th:if="${error}" class="alert-info" style="background: #fef2f2; color: #991b1b; border-color: #ef4444; margin-bottom: 20px;">
                <span th:text="${error}">Error message</span>
            </div>

            <form action="/configure" method="POST" id="configForm">
                <div class="print-token-card">
                    <div class="print-token-header">
                        <span class="print-token-label" th:text="#{page.setup.token.label}">Activation Token</span>
                        <span th:class="${connected ? 'print-token-status active' : 'print-token-status inactive'}">
                            <span th:if="${connected}" th:text="#{page.setup.status.connected}">Conectado</span>
                            <span th:unless="${connected}" th:text="#{page.setup.status.disconnected}">Desconectado</span>
                        </span>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <input type="text" id="token" name="token" class="form-control" 
                               th:value="${configToken}"
                               placeholder="Cole o token pa_live_..." required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="printer" th:text="#{page.setup.printer.label}">Order Printer</label>
                    <select id="printer" name="printer" class="form-control" required>
                        <option value="" disabled th:selected="${selectedPrinter == null}" th:text="#{page.setup.printer.placeholder}">Select a printer...</option>
                        <option th:each="printerName : ${printers}" 
                                th:value="${printerName}" 
                                th:text="${printerName}"
                                th:selected="${printerName == selectedPrinter}">Printer Name</option>
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <button type="submit" class="btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
                        <span th:text="#{page.setup.button.save}">Save and Connect</span>
                    </button>
                    <button type="button" class="btn" style="background: #f3f4f6; color: #374151; border: 1px solid #d1d5db;" onclick="submitTestPrint()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                        <span th:text="#{page.setup.button.test}">Print Test</span>
                    </button>
                </div>
            </form>

            <form id="testPrintForm" action="/test-print" method="POST" style="display:none;">
                <input type="hidden" name="printer" id="testPrinterInput">
            </form>

            <script>
                function submitTestPrint() {
                    const printer = document.getElementById('printer').value;
                    if (!printer) {
                        alert('Selecione uma impressora primeiro!');
                        return;
                    }
                    document.getElementById('testPrinterInput').value = printer;
                    document.getElementById('testPrintForm').submit();
                }
            </script>

            <div th:if="${connected}" class="print-connection-info shadow-sm">
                <div class="print-connection-item">
                    <label th:text="#{page.setup.connection.queue}">Queue Status</label>
                    <span th:text="${queueName}">restaurant_kitchen_queue</span>
                </div>
                <div class="print-connection-item">
                    <label th:text="#{page.setup.connection.host}">Host</label>
                    <span th:text="${rabbitHost}">mq.tablesplit.com</span>
                </div>
            </div>

            <div class="alert-info">
                <strong th:text="#{page.setup.howitworks.title}">💡 How it works:</strong><br>
                <span th:text="#{page.setup.howitworks.description}">The agent monitors the order queue...</span>
            </div>
        </div>

        <div class="footer-text">
            &copy; 2026 TableSplit Platform • v1.2.0
        </div>
    </div>
</body>
</html>
