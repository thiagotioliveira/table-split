openapi: 3.0.3
info:
  title: Manager Account Context API
  description: API for retrieving the manager account context (sidebar, restaurant and user info).
  version: 1.0.0
servers:
  - url: /api/v1/account
    description: v1 API for Account Context

tags:
  - name: Context
    description: Account context operations

paths:
  /context:
    get:
      tags:
        - Context
      summary: Get account context data
      operationId: getAccountContext
      responses:
        '200':
          description: Successful account context retrieval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountContextResponse'

components:
  schemas:
    AccountContextResponse:
      type: object
      properties:
        restaurantName:
          type: string
        userName:
          type: string
        userEmail:
          type: string
        userAvatar:
          type: string
        sidebarModules:
          type: array
          items:
            $ref: '#/components/schemas/ModuleResponse'
        footerModules:
          type: array
          items:
            $ref: '#/components/schemas/ModuleResponse'

    ModuleResponse:
      type: object
      properties:
        name:
          type: string
        label:
          type: string
        icon:
          type: string
        href:
          type: string
        active:
          type: boolean
