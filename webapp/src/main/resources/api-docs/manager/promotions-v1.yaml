openapi: 3.0.3
info:
  title: Promotions Manager API
  description: API for managing promotions, combos and coupons in TableSplit Manager.
  version: 1.0.0
servers:
  - url: /api/v1/manager/promotions
tags:
  - name: Promotions
  - name: Combos
  - name: Coupons

paths:
  /promotion:
    post:
      tags: [Promotions]
      summary: Create or update a promotion
      operationId: savePromotion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SavePromotionRequest'
      responses:
        '200':
          description: Promotion saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromotionResponse'

  /promotion/{id}:
    get:
      tags: [Promotions]
      summary: Get promotion by ID
      operationId: getPromotion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Promotion found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromotionResponse'
    delete:
      tags: [Promotions]
      summary: Delete promotion
      operationId: deletePromotion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Promotion deleted

  /promotion/{id}/toggle:
    post:
      tags: [Promotions]
      summary: Toggle promotion active status
      operationId: togglePromotion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Status toggled

  /combo:
    post:
      tags: [Combos]
      summary: Create or update a combo
      operationId: saveCombo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveComboRequest'
      responses:
        '200':
          description: Combo saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComboResponse'

  /combo/{id}:
    get:
      tags: [Combos]
      summary: Get combo by ID
      operationId: getCombo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Combo found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComboResponse'
    delete:
      tags: [Combos]
      summary: Delete combo
      operationId: deleteCombo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Combo deleted

  /combo/{id}/toggle:
    post:
      tags: [Combos]
      summary: Toggle combo active status
      operationId: toggleCombo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Status toggled

  /coupon:
    post:
      tags: [Coupons]
      summary: Create or update a coupon
      operationId: saveCoupon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaveCouponRequest'
      responses:
        '200':
          description: Coupon saved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponResponse'

  /coupon/{id}:
    get:
      tags: [Coupons]
      summary: Get coupon by ID
      operationId: getCoupon
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Coupon found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CouponResponse'
    delete:
      tags: [Coupons]
      summary: Delete coupon
      operationId: deleteCoupon
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Coupon deleted

  /coupon/{id}/toggle:
    post:
      tags: [Coupons]
      summary: Toggle coupon active status
      operationId: toggleCoupon
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Status toggled

components:
  schemas:
    SavePromotionRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        discountType:
          type: string
          enum: [PERCENTAGE, FIXED_VALUE]
        discountValue:
          type: number
        minOrderValue:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        daysOfWeek:
          type: array
          items:
            type: string
            enum: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]
        startTime:
          type: string
        endTime:
          type: string
        applyType:
          type: string
          enum: [ALL_MENU, CATEGORY, ITEM]
        applicableIds:
          type: array
          items:
            type: string
        active:
          type: boolean

    PromotionResponse:
      allOf:
        - $ref: '#/components/schemas/SavePromotionRequest'

    SaveComboRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        comboPrice:
          type: number
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        active:
          type: boolean
        items:
          type: array
          items:
            $ref: '#/components/schemas/ComboItemRequest'

    ComboItemRequest:
      type: object
      properties:
        itemId:
          type: string
          format: uuid
        quantity:
          type: integer

    ComboResponse:
      allOf:
        - $ref: '#/components/schemas/SaveComboRequest'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/ComboItemResponse'

    ComboItemResponse:
      type: object
      properties:
        itemId:
          type: string
          format: uuid
        quantity:
          type: integer

    SaveCouponRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        discountType:
          type: string
          enum: [PERCENTAGE, FIXED_VALUE, FREE_ITEM]
        discountValue:
          type: number
        freeItemId:
          type: string
          format: uuid
        minOrderValue:
          type: number
        validDate:
          type: string
          format: date
        usageLimit:
          type: integer
        active:
          type: boolean
        rules:
          type: array
          items:
            $ref: '#/components/schemas/CouponRuleRequest'

    CouponRuleRequest:
      type: object
      properties:
        type:
          type: string
          enum: [NEW_CUSTOMER, MIN_ITEM_QUANTITY, CATEGORY_ONLY, CATEGORY_REQUIRED]
        value:
          type: string

    CouponResponse:
      allOf:
        - $ref: '#/components/schemas/SaveCouponRequest'
        - type: object
          properties:
            usedCount:
              type: integer
            rules:
              type: array
              items:
                $ref: '#/components/schemas/CouponRuleResponse'

    CouponRuleResponse:
      $ref: '#/components/schemas/CouponRuleRequest'
