openapi: 3.0.3
info:
  title: Manager Order & Table API
  description: API for managing orders and tables in the TableSplit Manager module.
  version: 1.0.0
servers:
  - url: /api/v1/manager
    description: v1 API for Manager module

tags:
  - name: Orders
    description: Order management operations
  - name: Tables
    description: Table management operations
  - name: Feedbacks
    description: Feedback management operations

paths:
  # Order Endpoints
  /orders/history:
    get:
      tags:
        - Orders
      summary: Get order history
      operationId: getOrderHistory
      parameters:
        - name: start
          in: query
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Successful history retrieval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistoryResponse'

  /orders/move:
    post:
      tags:
        - Orders
      summary: Move ticket to another table/status
      operationId: moveTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveTicketRequest'
      responses:
        '204':
          description: Ticket moved successfully

  /orders/{id}:
    get:
      tags:
        - Orders
      summary: Get ticket by ID
      operationId: getTicketById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful ticket retrieval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'

  /orders/count/pending:
    get:
      tags:
        - Orders
      summary: Get pending tickets count
      operationId: getPendingCount
      responses:
        '200':
          description: Successful count retrieval
          content:
            application/json:
              schema:
                type: integer
                format: int64

  /orders/item/cancel:
    post:
      tags:
        - Orders
      summary: Cancel a ticket item
      operationId: cancelTicketItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelItemRequest'
      responses:
        '204':
          description: Item cancelled successfully

  /orders/tables/{tableId}/place:
    post:
      tags:
        - Orders
      summary: Place a new order for a table
      operationId: placeOrder
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceOrderRequest'
      responses:
        '204':
          description: Order placed successfully

  /orders/items/{itemId}/status:
    post:
      tags:
        - Orders
      summary: Update ticket item status
      operationId: updateItemStatus
      parameters:
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateItemStatusRequest'
      responses:
        '204':
          description: Status updated successfully

  # Table Endpoints
  /tables:
    post:
      tags:
        - Tables
      summary: Create a new table
      operationId: createTable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTableRequest'
      responses:
        '200':
          description: Table created successfully

  /tables/{tableId}:
    delete:
      tags:
        - Tables
      summary: Delete a table
      operationId: deleteTable
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Table deleted successfully

  /tables/{tableId}/open:
    post:
      tags:
        - Tables
      summary: Open a table
      operationId: openTable
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Table opened successfully

  /tables/orders/{orderId}/close:
    post:
      tags:
        - Tables
      summary: Close an order
      operationId: closeOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order closed successfully

  /tables/orders/{orderId}/detail:
    get:
      tags:
        - Tables
      summary: Get full order detail
      operationId: getOrderDetail
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful detail retrieval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableOrderHistoryResponse'

  /tables/{tableId}/history:
    get:
      tags:
        - Tables
      summary: Get table order history
      operationId: getTableHistory
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [OPEN, CLOSED]
        - name: start
          in: query
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Successful history retrieval
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TableOrderHistoryResponse'

  /tables/{tableId}/payment:
    post:
      tags:
        - Tables
      summary: Process a payment for a table
      operationId: processPayment
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '200':
          description: Payment processed successfully

  /feedbacks:
    get:
      tags:
        - Feedbacks
      summary: Get feedback overview and list
      operationId: getFeedbacks
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 30
      responses:
        '200':
          description: Successful feedback retrieval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackOverviewResponse'

  /tables/{tableId}/payment/{paymentId}:
    delete:
      tags:
        - Tables
      summary: Delete a payment
      operationId: deletePayment
      parameters:
        - name: tableId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payment deleted successfully

components:
  schemas:
    UpdateItemStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [PENDING, PREPARING, READY, DELIVERED, CANCELLED]

    PlaceOrderRequest:
      type: object
      required:
        - tickets
      properties:
        tickets:
          type: array
          items:
            $ref: '#/components/schemas/TicketRequest'
        customers:
          type: array
          items:
            $ref: '#/components/schemas/CustomerRequest'
        serviceFee:
          type: integer

    TicketRequest:
      type: object
      required:
        - items
      properties:
        note:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/TicketItemRequest'

    TicketItemRequest:
      type: object
      required:
        - itemId
        - quantity
      properties:
        itemId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        quantity:
          type: integer
        note:
          type: string
        promotionId:
          type: string
          format: uuid
        originalPrice:
          type: number
          format: double
        discountType:
          type: string
        discountValue:
          type: number
          format: double
        customizations:
          type: array
          items:
            $ref: '#/components/schemas/CustomizationRequest'

    CustomizationRequest:
      type: object
      required:
        - title
        - options
      properties:
        title:
          type: string
        options:
          type: array
          items:
            $ref: '#/components/schemas/OptionRequest'

    OptionRequest:
      type: object
      required:
        - text
      properties:
        optionId:
          type: string
          format: uuid
        text:
          type: string
        extraPrice:
          type: number
          format: double

    CustomerRequest:
      type: object
      required:
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    HistoryResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/TicketResponse'
        totalOrders:
          type: integer
        totalRevenue:
          type: number
          format: double
        avgTicket:
          type: number
          format: double

    TicketResponse:
      type: object
      properties:
        restaurantId:
          type: string
          format: uuid
        id:
          type: string
          format: uuid
        shortId:
          type: string
        tableCod:
          type: string
        customerName:
          type: string
        status:
          type: string
          enum: [PENDING, PREPARING, READY, DELIVERED, CANCELLED]
        statusClass:
          type: string
        statusLabel:
          type: string
        createdAt:
          type: string
          format: date-time
        timeAgo:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/TicketItemResponse'
        total:
          type: number
          format: double
        urgent:
          type: boolean
        note:
          type: string

    TicketItemResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        customerName:
          type: string
        name:
          type: string
        names:
          type: object
          additionalProperties:
            type: string
        quantity:
          type: integer
        unitPrice:
          type: number
          format: double
        totalPrice:
          type: number
          format: double
        note:
          type: string
        status:
          type: string
        statusClass:
          type: string
        rating:
          type: integer
        createdAt:
          type: string
          format: date-time
        customizationSummary:
          type: string

    MoveTicketRequest:
      type: object
      required:
        - ticketId
        - status
      properties:
        ticketId:
          type: string
          format: uuid
        status:
          type: string

    CancelItemRequest:
      type: object
      required:
        - itemId
        - quantity
      properties:
        itemId:
          type: string
          format: uuid
        quantity:
          type: integer
        reason:
          type: string

    CreateTableRequest:
      type: object
      required:
        - cod
      properties:
        cod:
          type: string
          pattern: '^[0-9]{2}$'

    PaymentRequest:
      type: object
      required:
        - amount
        - method
      properties:
        customerId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        method:
          type: string
          enum: [CASH, CARD, MB_WAY]
        note:
          type: string

    TableOrderHistoryResponse:
      type: object
      properties:
        id:
          type: string
        tableId:
          type: string
        serviceFee:
          type: integer
        status:
          type: string
        openedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/TicketItemResponse'
        payments:
          type: array
          items:
            $ref: '#/components/schemas/HistoryPaymentResponse'
        customerNames:
          type: object
          additionalProperties:
            type: string
        total:
          type: number
          format: double

    HistoryPaymentResponse:
      type: object
      properties:
        id:
          type: string
        customerId:
          type: string
          format: uuid
        amount:
          type: number
          format: double
        paidAt:
          type: string
          format: date-time
        method:
          type: string
        note:
          type: string

    FeedbackOverviewResponse:
      type: object
      properties:
        feedbacks:
          type: array
          items:
            $ref: '#/components/schemas/OrderFeedbackResponse'
        stats:
          $ref: '#/components/schemas/FeedbackStats'
        distribution:
          $ref: '#/components/schemas/RatingDistribution'
        topRatedItems:
          type: array
          items:
            $ref: '#/components/schemas/ItemRatingResponse'
        needAttentionItems:
          type: array
          items:
            $ref: '#/components/schemas/ItemRatingResponse'

    OrderFeedbackResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        orderShortId:
          type: string
        customerId:
          type: string
          format: uuid
        customerName:
          type: string
        rating:
          type: integer
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
        timeAgo:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/FeedbackItemResponse'

    FeedbackItemResponse:
      type: object
      properties:
        name:
          type: string
        rating:
          type: integer

    FeedbackStats:
      type: object
      properties:
        averageRating:
          type: number
          format: double
        totalFeedbacks:
          type: integer
        positiveCount:
          type: integer
        negativeCount:
          type: integer
        totalItemsRated:
          type: integer
        ratingTrend:
          type: number
          format: double
        totalTrend:
          type: number
          format: double

    RatingDistribution:
      type: object
      properties:
        r5: { type: integer }
        r4: { type: integer }
        r3: { type: integer }
        r2: { type: integer }
        r1: { type: integer }
        r0: { type: integer }

    ItemRatingResponse:
      type: object
      properties:
        itemId:
          type: string
          format: uuid
        name:
          type: string
        imageUrl:
          type: string
        averageRating:
          type: number
          format: double
        reviewCount:
          type: integer
