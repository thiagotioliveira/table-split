server:
  forward-headers-strategy: native
  servlet:
    session:
      timeout: 12h
      cookie:
        name: TABLESPLIT_SESSION

spring:
  application:
    name: table-split
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 31536000
      chain:
        strategy:
          content:
            enabled: true
            paths: /**
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        multiTenancy: SCHEMA
        connection:
          provider_disables_autocommit: true
  messages:
    basename: messages
    encoding: UTF-8
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

cloudinary:
  cloud-name:
  api-key:
  api-secret:
  root-folder: dev

app:
  version: "@project.version@"
  demo:
    restaurant-id: 4ec8cc82-9185-444c-9aee-71502a7f991c
    fake-orders:
      customer-names:
        - "Thiago Oliveira"
        - "Ana Silva"
        - "Pedro Santos"
        - "Maria Ferreira"
        - "João Pereira"
        - "Carla Rodrigues"
        - "Ricardo Costa"
        - "Sílvia Gomes"
        - "Nuno Martins"
        - "Beatriz Lopes"
      feedbacks:
        5:
          - "Experiência fantástica! Tudo perfeito."
          - "Comida maravilhosa e atendimento nota 10."
          - "O melhor restaurante da cidade, com certeza!"
          - "Ambiente agradável e pratos deliciosos."
        4:
          - "Muito bom, recomendo vivamente."
          - "Gostei bastante da comida, voltarei em breve."
          - "Atendimento atencioso e comida saborosa."
          - "Experiência positiva no geral."
        3:
          - "Refeição ok, nada de extraordinário."
          - "O atendimento foi um pouco lento, mas a comida estava boa."
          - "Preço justo para a qualidade apresentada."
        2:
          - "Pode melhorar bastante no tempo de espera."
          - "A comida chegou morna à mesa."
          - "Esperava mais pelo preço cobrado."
        1:
          - "Não gostei da experiência, não pretendo voltar."
          - "Atendimento muito abaixo do esperado."
          - "Comida sem sabor e ambiente barulhento."
  register:
    enabled: true
  integration:
    rabbit:
      enabled: false
      order-ticket-exchange: order.ticket.exchange
  time:
    zone-id: Europe/Lisbon
  cleaner:
    username:
    password:
    retention-days: 90
  menu:
    item:
      image:
        max-size: 1048576 #1MB
  gallery:
    image:
      max-size: 1048576 #1MB
  push:
    public-key:
    private-key:
    subject: mailto:info@tablesplit.app

logging:
  level:
    ROOT: INFO
    org:
      hibernate:
        SQL: INFO
        type:
          descriptor:
            sql:
              BasicBinder: INFO
      springframework:
        transaction: OFF
        web.servlet: ERROR
    dev.thiagooliveira: INFO
    liquibase: OFF

management:
  endpoints:
    web:
      exposure:
        include: health, info
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  health:
    rabbit:
      enabled: ${app.integration.rabbit.enabled}

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:}