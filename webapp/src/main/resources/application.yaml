server:
  forward-headers-strategy: native
  servlet:
    session:
      timeout: 12h
      cookie:
        name: TABLESPLIT_SESSION

spring:
  application:
    name: table-split
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 31536000
      chain:
        strategy:
          content:
            enabled: true
            paths: /**
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        multiTenancy: SCHEMA
        connection:
          provider_disables_autocommit: true
  messages:
    basename: messages
    encoding: UTF-8
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

cloudinary:
  cloud-name:
  api-key:
  api-secret:
  root-folder: dev

app:
  version: "@project.version@"
  register:
    enabled: true
  integration:
    rabbit:
      enabled: false
  time:
    zone-id: Europe/Lisbon
  cleaner:
    username:
    password:
    retention-days: 90
  menu:
    item:
      image:
        max-size: 1048576 #1MB
  gallery:
    image:
      max-size: 1048576 #1MB
  push:
    public-key:
    private-key:
    subject: mailto:info@tablesplit.app

logging:
  level:
    ROOT: INFO
    org:
      hibernate:
        SQL: INFO
        type:
          descriptor:
            sql:
              BasicBinder: INFO
      springframework:
        transaction: OFF
        web.servlet: ERROR
    dev.thiagooliveira: INFO
    liquibase: OFF

management:
  endpoints:
    web:
      exposure:
        include: health, info
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  health:
    rabbit:
      enabled: ${app.integration.rabbit.enabled}

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    username: ${TELEGRAM_BOT_USERNAME:}