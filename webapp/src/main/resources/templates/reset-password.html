<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="#{page.staff.set_password.title}">Definir Senha - TableSplit</title>

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#c9a050">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TableSplit">

  <!-- Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" href="/images/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/images/icons/icon-192x192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/images/icons/icon-72x72.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/icons/icon-72x72.png">
  <link rel="stylesheet" th:href="@{/css/login.css(v=${appVersion})}">
  <style>
    /* Strength bar */
    .password-strength {
      margin-top: 0.5rem;
    }

    .strength-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 0.375rem;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      transition: all 0.3s ease;
    }

    .strength-fill.weak { width: 25%; background: var(--destructive); }
    .strength-fill.fair { width: 50%; background: var(--orange); }
    .strength-fill.good { width: 75%; background: #84CC16; }
    .strength-fill.strong { width: 100%; background: var(--green); }

    .strength-text {
      font-size: 0.75rem;
      color: var(--muted-foreground);
    }

    /* Password Requirements */
    .password-requirements {
      background: var(--background);
      border-radius: var(--radius);
      padding: 1rem;
      margin-top: 1rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
    }

    .password-requirements h4 {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--foreground);
      margin: 0 0 0.5rem 0;
    }

    .password-requirements ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .password-requirements li {
      font-size: 0.75rem;
      color: var(--muted-foreground);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.375rem;
    }

    .password-requirements li:last-child {
      margin-bottom: 0;
    }

    .password-requirements li svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .password-requirements li.valid {
      color: var(--green);
    }

    .password-requirements li.valid svg {
      fill: none;
      stroke: currentColor;
      stroke-width: 3;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="auth-header">
    <a href="/" class="logo">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
          <path d="M7 2v20"/>
          <path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
        </svg>
      </div>
      <span class="logo-text" th:text="#{app.name}">TableSplit</span>
    </a>
  </header>

  <!-- Main -->
  <main class="auth-main">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-card-header">
          <h1 th:text="#{page.staff.set_password.header}">Redefinir Senha</h1>
          <p th:text="#{page.staff.set_password.subheader}">Configure sua nova senha de acesso ao TableSplit</p>
        </div>

        <div class="auth-card-body">
          <div th:replace="~{components/alert :: alert}"></div>

          <form th:action="@{/reset-password}" method="post" onsubmit="return validateForm()">
            <input type="hidden" name="token" th:value="${token}">

            <div class="form-group" id="passwordGroup">
              <label for="password" th:text="#{page.user.profile.new.password}">Nova Senha</label>
              <div class="input-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" autocomplete="new-password" oninput="checkPasswordStrength()" required>
                <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
                  <svg id="eyeIcon1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <div class="password-strength">
                <div class="strength-bar">
                  <div class="strength-fill" id="strengthFill"></div>
                </div>
                <p class="strength-text" id="strengthText" th:text="#{page.user.profile.new.password.hint}">Use letras, números e símbolos</p>
              </div>
            </div>

            <div class="form-group" id="confirmPasswordGroup">
              <label for="confirmPassword" th:text="#{page.user.profile.new.password2}">Confirmar Nova Senha</label>
              <div class="input-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" autocomplete="new-password" required>
                <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)">
                  <svg id="eyeIcon2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
            </div>

            <div class="password-requirements">
              <h4 th:text="#{page.user.profile.password.requirements}">Password Requirements</h4>
              <ul>
                <li id="reqLength">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>
                  <span th:text="#{page.user.profile.password.requirements.min.char}">Minimum of 8 characters</span>
                </li>
                <li id="reqUpper">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>
                  <span th:text="#{page.user.profile.password.requirements.one.capital.letter}">One capital letter</span>
                </li>
                <li id="reqLower">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>
                  <span th:text="#{page.user.profile.password.requirements.one.lowercase.letter}">A lowercase letter</span>
                </li>
                <li id="reqNumber">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>
                  <span th:text="#{page.user.profile.password.requirements.one.number}">Um número</span>
                </li>
              </ul>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
              <div class="btn-content">
                <span th:text="#{page.staff.set_password.button}">Ativar e Acessar</span>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 12h14"/>
                  <path d="m12 5 7 7-7 7"/>
                </svg>
              </div>
              <div class="spinner"></div>
            </button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="auth-footer">
    <p th:text="#{app.footer}">© 2026 TableSplit. All rights reserved.</p>
  </footer>

  <script>
    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      const svg = button.querySelector('svg');
      if (input.type === 'password') {
        input.type = 'text';
        svg.innerHTML = `
          <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
          <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
          <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
          <line x1="2" x2="22" y1="2" y2="22"/>
        `;
      } else {
        input.type = 'password';
        svg.innerHTML = `
          <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
          <circle cx="12" cy="12" r="3"/>
        `;
      }
    }

    function checkPasswordStrength() {
      const password = document.getElementById('password').value;
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');

      const hasLength = password.length >= 8;
      const hasUpper = /[A-Z]/.test(password);
      const hasLower = /[a-z]/.test(password);
      const hasNumber = /\d/.test(password);

      updateRequirement('reqLength', hasLength);
      updateRequirement('reqUpper', hasUpper);
      updateRequirement('reqLower', hasLower);
      updateRequirement('reqNumber', hasNumber);

      let strength = 0;
      if (hasLength) strength++;
      if (hasUpper) strength++;
      if (hasLower) strength++;
      if (hasNumber) strength++;

      fill.className = 'strength-fill';
      if (strength === 0) {
        text.textContent = 'Use letras, números e símbolos';
      } else if (strength === 1) {
        fill.classList.add('weak');
        text.textContent = 'Senha fraca';
      } else if (strength === 2) {
        fill.classList.add('fair');
        text.textContent = 'Senha razoável';
      } else if (strength === 3) {
        fill.classList.add('good');
        text.textContent = 'Senha boa';
      } else {
        fill.classList.add('strong');
        text.textContent = 'Senha forte!';
      }
    }

    function updateRequirement(id, valid) {
      const el = document.getElementById(id);
      const svg = el.querySelector('svg');
      if (valid) {
        el.classList.add('valid');
        svg.innerHTML = '<path d="M20 6 9 17l-5-5"/>';
      } else {
        el.classList.remove('valid');
        svg.innerHTML = '<circle cx="12" cy="12" r="10"/>';
      }
    }

    function validateForm() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      const hasLength = password.length >= 8;
      const hasUpper = /[A-Z]/.test(password);
      const hasLower = /[a-z]/.test(password);
      const hasNumber = /\d/.test(password);

      if (!hasLength || !hasUpper || !hasLower || !hasNumber) {
        alert("A senha não atende a todos os requisitos de segurança.");
        return false;
      }

      if (password !== confirm) {
        alert("A confirmação de senha não coincide.");
        return false;
      }
      return true;
    }
  </script>
</body>
</html>
