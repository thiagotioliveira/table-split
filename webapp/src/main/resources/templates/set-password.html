<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="#{page.staff.set_password.title}">Definir Senha - TableSplit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css(v=${appVersion})}">
  <style>
    body {
      background-color: #faf8f5;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
    }

    .auth-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem;
      width: 100%;
      max-width: 28rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }

    .auth-logo {
      font-size: 1.75rem;
      font-weight: 700;
      color: #c9a050; /* Gold */
      text-align: center;
      margin-bottom: 2rem;
      letter-spacing: -0.025em;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-header h2 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--foreground);
      margin-bottom: 0.5rem;
    }

    .auth-header p {
      color: var(--muted);
      font-size: 0.875rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
    }

    .password-wrapper {
      position: relative;
    }

    .form-input {
      width: 100%;
      padding: 0.6875rem 2.5rem 0.6875rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.875rem;
      background: var(--card);
      font-family: inherit;
      box-sizing: border-box;
    }

    .form-input:focus {
      outline: none;
      border-color: #c9a050;
    }

    .password-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .password-toggle:hover {
      color: var(--foreground);
    }

    .password-toggle svg {
      width: 18px;
      height: 18px;
    }

    /* Strength bar */
    .password-strength {
      margin-top: 0.5rem;
    }

    .strength-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 0.375rem;
    }

    .strength-fill {
      height: 100%;
      width: 0%;
      transition: all 0.3s ease;
    }

    .strength-fill.weak { width: 25%; background: var(--destructive); }
    .strength-fill.fair { width: 50%; background: var(--orange); }
    .strength-fill.good { width: 75%; background: #84CC16; }
    .strength-fill.strong { width: 100%; background: var(--green); }

    .strength-text {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* Password Requirements */
    .password-requirements {
      background: var(--background-secondary);
      border-radius: var(--radius);
      padding: 1rem;
      margin-top: 1rem;
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
    }

    .password-requirements h4 {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--foreground);
      margin: 0 0 0.5rem 0;
    }

    .password-requirements ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .password-requirements li {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.375rem;
    }

    .password-requirements li:last-child {
      margin-bottom: 0;
    }

    .password-requirements li svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
    }

    .password-requirements li.valid {
      color: var(--green);
    }

    .password-requirements li.valid svg {
      fill: none;
      stroke: currentColor;
      stroke-width: 3;
    }

    .btn-primary {
      background: #c9a050;
      border-color: #c9a050;
      color: white;
      width: 100%;
      padding: 0.6875rem;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #b58d40;
      border-color: #b58d40;
    }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo">TableSplit</div>
    <div class="auth-header">
      <h2 th:text="#{page.staff.set_password.header}">Ativar Conta</h2>
      <p th:text="#{page.staff.set_password.subheader}">Configure sua senha de acesso ao TableSplit</p>
    </div>

    <div th:replace="~{components/alert :: alert}"></div>

    <form th:action="@{/login-staff/set-password}" method="post" onsubmit="return validateForm()">
      <input type="hidden" name="token" th:value="${token}">
      <input type="hidden" name="slug" th:value="${slug}">
      
      <div class="form-group">
        <label class="form-label" for="password" th:text="#{page.user.profile.new.password}">Nova Senha</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" class="form-input" oninput="checkPasswordStrength()" required>
          <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="password-strength">
          <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <p class="strength-text" id="strengthText" th:text="#{page.user.profile.new.password.hint}">Use letras, números e símbolos</p>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword" th:text="#{page.user.profile.new.password2}">Confirmar Nova Senha</label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" class="form-input" required>
          <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="password-requirements">
        <h4 th:text="#{page.user.profile.password.requirements}">Password Requirements</h4>
        <ul>
          <li id="reqLength">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>
            <span th:text="#{page.user.profile.password.requirements.min.char}">Minimum of 8 characters</span>
          </li>
          <li id="reqUpper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>
            <span th:text="#{page.user.profile.password.requirements.one.capital.letter}">One capital letter</span>
          </li>
          <li id="reqLower">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>
            <span th:text="#{page.user.profile.password.requirements.one.lowercase.letter}">A lowercase letter</span>
          </li>
          <li id="reqNumber">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>
            <span th:text="#{page.user.profile.password.requirements.one.number}">Um número</span>
          </li>
        </ul>
      </div>

      <button type="submit" class="btn btn-primary" th:text="#{page.staff.set_password.button}">Ativar e Acessar</button>
    </form>
  </div>

  <script>
    function togglePassword(inputId, button) {
      const input = document.getElementById(inputId);
      const svg = button.querySelector('svg');
      if (input.type === 'password') {
        input.type = 'text';
        svg.innerHTML = `
          <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
          <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
          <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
          <line x1="2" x2="22" y1="2" y2="22"/>
        `;
      } else {
        input.type = 'password';
        svg.innerHTML = `
          <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
          <circle cx="12" cy="12" r="3"/>
        `;
      }
    }

    function checkPasswordStrength() {
      const password = document.getElementById('password').value;
      const fill = document.getElementById('strengthFill');
      const text = document.getElementById('strengthText');

      const hasLength = password.length >= 8;
      const hasUpper = /[A-Z]/.test(password);
      const hasLower = /[a-z]/.test(password);
      const hasNumber = /\d/.test(password);

      updateRequirement('reqLength', hasLength);
      updateRequirement('reqUpper', hasUpper);
      updateRequirement('reqLower', hasLower);
      updateRequirement('reqNumber', hasNumber);

      let strength = 0;
      if (hasLength) strength++;
      if (hasUpper) strength++;
      if (hasLower) strength++;
      if (hasNumber) strength++;

      fill.className = 'strength-fill';
      if (strength === 0) {
        text.textContent = 'Use letras, números e símbolos';
      } else if (strength === 1) {
        fill.classList.add('weak');
        text.textContent = 'Senha fraca';
      } else if (strength === 2) {
        fill.classList.add('fair');
        text.textContent = 'Senha razoável';
      } else if (strength === 3) {
        fill.classList.add('good');
        text.textContent = 'Senha boa';
      } else {
        fill.classList.add('strong');
        text.textContent = 'Senha forte!';
      }
    }

    function updateRequirement(id, valid) {
      const el = document.getElementById(id);
      const svg = el.querySelector('svg');
      if (valid) {
        el.classList.add('valid');
        svg.innerHTML = '<path d="M20 6 9 17l-5-5"/>';
      } else {
        el.classList.remove('valid');
        svg.innerHTML = '<circle cx="12" cy="12" r="10"/>';
      }
    }

    function validateForm() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;

      const hasLength = password.length >= 8;
      const hasUpper = /[A-Z]/.test(password);
      const hasLower = /[a-z]/.test(password);
      const hasNumber = /\d/.test(password);

      if (!hasLength || !hasUpper || !hasLower || !hasNumber) {
        alert("A senha não atende a todos os requisitos de segurança.");
        return false;
      }

      if (password !== confirm) {
        alert("A confirmação de senha não coincide.");
        return false;
      }
      return true;
    }
  </script>
</body>
</html>
