<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body th:style="'font-family: ' + ${theme.fontBody} + ', Inter, -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif; background-color: ' + ${theme.background} + '; color: ' + ${theme.text} + '; margin: 0; padding: 40px 0;'">

  <div th:style="'max-width: 540px; margin: 0 auto; background: ' + ${theme.card} + '; padding: 40px; border-radius: 12px; border: 1px solid #e5e5e5; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);'">

    <div th:style="'font-size: 20px; font-weight: 600; color: ' + ${theme.text} + '; margin-bottom: 20px;'"
         th:text="#{mail.staff.welcome.title(${restaurantName})}">Bem-vindo ao TableSplit!</div>

    <p th:style="'font-size: 14px; line-height: 1.6; color: ' + ${theme.text} + '; margin-bottom: 20px;'">
      Olá, <strong th:text="${firstName}">Membro</strong>!
    </p>

    <p th:style="'font-size: 14px; line-height: 1.6; color: ' + ${theme.text} + '; margin-bottom: 20px;'"
       th:text="#{mail.staff.welcome.body(${restaurantName})}">
      Você foi adicionado como membro da equipe. Para ativar a sua conta e definir a sua senha pessoal de acesso, por favor clique no botão abaixo:
    </p>

    <div style="text-align: center; margin: 30px 0;">
      <a th:href="${verifyUrl}"
         th:style="'display: inline-block; padding: 12px 30px; background-color: ' + ${theme.primary} + '; color: ' + ${theme.textOnPrimary} + ' !important; text-decoration: none; font-weight: 600; font-size: 14px; border-radius: 6px;'"
         th:text="#{mail.staff.welcome.button}">Definir Minha Senha</a>
    </div>

    <p th:style="'font-size: 14px; line-height: 1.6; color: ' + ${theme.text} + '; margin-bottom: 20px;'"
       th:text="#{mail.staff.welcome.expiry}">Este link de ativação é válido por 24 horas.</p>

    <div th:style="'font-size: 12px; color: ' + ${theme.text} + '; text-align: center; margin-top: 40px; border-top: 1px solid #e5e5e5; padding-top: 20px; opacity: 0.6;'">
      © 2026 TableSplit. Todos os direitos reservados.
    </div>

  </div>

</body>
</html>
