<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="#{app.title}">TableSplit - Erro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: #faf8f5;
      --foreground: #1a1714;
      --primary: #c9a050;
      --primary-dark: #a88535;
      --primary-light: rgba(201, 160, 80, 0.15);
      --muted: #6b635a;
      --border: #e8e4de;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--background);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 420px;
    }

    .icon-container {
      width: 80px;
      height: 80px;
      background: var(--primary-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .icon-container svg {
      width: 40px;
      height: 40px;
      color: var(--primary);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--foreground);
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.9375rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
      border: none;
      font-family: inherit;
    }

    .btn-primary {
      color: white;
      background: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .help-text {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .help-text a {
      color: var(--primary);
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="icon-container">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
    </svg>
  </div>

  <h1 th:text="#{error.page.title}">Ops! Algo deu errado</h1>
  <p th:text="#{error.page.message}">Não foi possível processar sua requisição no momento. Nossa equipe já foi notificada.</p>

  <div class="actions">
    <a href="/" class="btn btn-primary" th:text="#{error.page.button.home}">
      Ir para o início
    </a>
  </div>

  <div class="help-text">
    <span th:text="#{error.page.help.text}">Precisa de ajuda? Entre em contato com o</span>
    <a href="mailto:suporte@tablesplit.app" th:text="#{error.page.help.link}">suporte</a>
  </div>
</div>
</body>
</html>
