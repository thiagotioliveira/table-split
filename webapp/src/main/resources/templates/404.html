<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada - TableSplit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Backgrounds */
      --background: #faf8f5;
      --foreground: #1a1714;

      /* Primary colors */
      --primary: #c9a050;
      --primary-dark: #a88535;
      --primary-light: rgba(201, 160, 80, 0.15);

      /* Neutral / muted */
      --muted: #6b635a;

      /* Borders */
      --border: #e8e4de;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--background);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 420px;
    }

    .icon-container {
      width: 80px;
      height: 80px;
      background: var(--primary-light);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }

    .icon-container svg {
      width: 40px;
      height: 40px;
      color: var(--primary);
    }

    .error-code {
      font-size: 4rem;
      font-weight: 700;
      color: var(--foreground);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--foreground);
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 0.9375rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-decoration: none;
      border: none;
      font-family: inherit;
    }

    .btn svg {
      width: 18px;
      height: 18px;
    }

    .btn-primary {
      color: white;
      background: var(--primary);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      color: var(--foreground);
      background: white;
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: #F4F4F5;
    }

    .help-text {
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .help-text a {
      color: var(--primary);
      text-decoration: none;
    }

    .help-text a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .error-code {
        font-size: 3rem;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="icon-container">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
    </svg>
  </div>

  <div class="error-code">404</div>
  <h1>Página não encontrada</h1>
  <p>A página que você está procurando não existe ou foi movida para outro endereço.</p>

  <div class="actions">
    <a th:href="${homeLink}" class="btn btn-primary">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
      </svg>
      Ir para o início
    </a>
    <button class="btn btn-secondary" onclick="history.back()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 15 3 9m0 0 6-6M3 9h12a6 6 0 0 1 0 12h-3" />
      </svg>
      Voltar
    </button>
  </div>

  <div class="help-text">
    Precisa de ajuda? Entre em contato com o <a href="mailto:suporte@tablesplit.app">suporte</a>
  </div>
</div>
</body>
</html>
