<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="sidebar(pageTitle, extraContent, showHeaderOnLg)">
    <th:block th:with="showHeaderOnLg=${showHeaderOnLg == null ? true : showHeaderOnLg}">
    
    <!-- Dynamic Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link th:href="@{https://fonts.googleapis.com/css2(family=${context.restaurant.theme.fontDisplay.replace(' ', '+') + ':wght@400;500;600;700&family=' + context.restaurant.theme.fontBody.replace(' ', '+') + ':wght@400;500;600;700&display=swap'})}" rel="stylesheet">

    <style th:inline="css">
        :root {
            --primary: [(${context.restaurant.theme.primary})];
            --primary-light: color-mix(in srgb, var(--primary) 10%, transparent);
            --primary-dark: color-mix(in srgb, var(--primary) 85%, black);
            --accent: [(${context.restaurant.theme.accent})];
            --accent-light: color-mix(in srgb, var(--accent) 15%, transparent);
            --on-accent: [(${context.restaurant.theme.textOnAccent})];
            --background: [(${context.restaurant.theme.background})];
            --background-secondary: color-mix(in srgb, var(--background) 95%, black);
            --card: [(${context.restaurant.theme.card})];
            --foreground: [(${context.restaurant.theme.text})];
            --muted: color-mix(in srgb, var(--foreground) 60%, transparent);
            --border: color-mix(in srgb, var(--foreground) 10%, transparent);
            --shadow-color: color-mix(in srgb, var(--foreground) 10%, transparent);
            
            --font-display: '[(${context.restaurant.theme.fontDisplay})]', sans-serif;
            --font-body: '[(${context.restaurant.theme.fontBody})]', sans-serif;
            color-scheme: [(${context.restaurant.theme.dark ? 'dark' : 'light'})];
        }

        body {
            font-family: var(--font-body) !important;
        }

        h1, h2, h3, h4, h5, h6, .logo-text, .nav-item span {
            font-family: var(--font-display);
        }

        /* Skeleton Loading */
        .skeleton {
            background: var(--background-secondary);
            background: linear-gradient(90deg, var(--background-secondary) 25%, var(--border) 50%, var(--background-secondary) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-text { height: 1rem; width: 100%; }
        .skeleton-avatar { width: 36px; height: 36px; border-radius: 50%; }
    </style>

<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
    <!-- Toggle Button -->
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Recolher menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>

    <div class="sidebar-header" style="display: flex; align-items: center; justify-content: space-between;">
        <a href="/dashboard" class="logo">
            <div class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
            </div>
            <div class="logo-text">
                <span style="font-size: 1rem;" th:text="#{app.name}">TableSplit</span>
                <span id="sidebarRestaurantName" class="skeleton skeleton-text" style="display: block; width: 100px; height: 0.75rem; margin-top: 4px;"></span>
            </div>
        </a>
        <button class="sidebar-close" onclick="closeSidebar()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
    </div>

    <nav class="sidebar-nav">
        <ul id="sidebarNavList">
            <li class="skeleton-item" style="padding: 0.75rem 1rem;">
                <div class="skeleton" style="height: 1.5rem; width: 100%; border-radius: 8px;"></div>
            </li>
            <li class="skeleton-item" style="padding: 0.75rem 1rem;">
                <div class="skeleton" style="height: 1.5rem; width: 100%; border-radius: 8px;"></div>
            </li>
            <li class="skeleton-item" style="padding: 0.75rem 1rem;">
                <div class="skeleton" style="height: 1.5rem; width: 100%; border-radius: 8px;"></div>
            </li>
        </ul>
    </nav>

    <div class="sidebar-footer">
        <div class="user-menu-container" id="userMenuContainer">
            <button class="user-menu-trigger" onclick="toggleUserMenu()">
                <div class="user-avatar skeleton"></div>
                <div class="user-details">
                    <div class="user-name skeleton skeleton-text" style="width: 80px; height: 0.875rem; margin-bottom: 4px;"></div>
                    <div class="user-email skeleton skeleton-text" style="width: 120px; height: 0.75rem;"></div>
                </div>
                <svg class="user-menu-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
            </button>
            <div class="user-submenu" id="userSubmenu">
                <div class="user-submenu-item skeleton skeleton-text" style="margin: 0.5rem 1rem; height: 1rem; width: 80%;"></div>
                <div class="user-submenu-item skeleton skeleton-text" style="margin: 0.5rem 1rem; height: 1rem; width: 60%;"></div>
                <div class="user-submenu-divider"></div>
                <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;"></form>
                <a href="#" onclick="document.getElementById('logoutForm').submit()" class="user-submenu-item danger">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
                    Sair
                </a>
            </div>
        </div>
    </div>
</aside>

<!-- Header -->
<header class="dashboard-header" th:classappend="${!showHeaderOnLg} ? 'lg-hidden'">
    <div class="dashboard-header-content">
        <div class="flex items-center gap-3" style="flex: 1;">
            <button class="hamburger-btn" onclick="openSidebar()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
            </button>
            <div class="lg-hidden flex items-center gap-3">
                <div class="logo-icon" style="width: 2rem; height: 2rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
                </div>
                <span style="font-weight: 700;" th:text="${pageTitle}">Title</span>
            </div>
        </div>
        <div style="flex: 1; display: flex; justify-content: center;">
            <h1 class="hidden lg-block" style="font-size: 1.25rem; font-weight: 600; margin: 0;" th:text="${pageTitle}">Title</h1>
        </div>
        <div style="flex: 1; display: flex; justify-content: flex-end;">
            <th:block th:if="${extraContent != null}">
                <th:block th:replace="${extraContent}"></th:block>
            </th:block>
        </div>
    </div>
</header>

    <script th:src="@{/js/progress.js(v=${appVersion})}"></script>
    <script th:src="@{/js/push-notifications.js(v=${appVersion})}"></script>

    <script type="module" th:inline="javascript">
        import { contextApi } from [[@{/js/api/v1/manager/api-context-bridge.js(v=${appVersion})}]];

        const SidebarManager = {
            init: function(currentModuleName) {
                this.currentModuleName = currentModuleName;

                // Auto-clear cache on any form submission (except logout)
                document.addEventListener('submit', (e) => {
                    if (e.target.id !== 'logoutForm') {
                        console.log('[SidebarManager] Cache cleared due to form submission');
                        this.clearCache();
                    }
                });

                const cached = sessionStorage.getItem('sidebarContext');
                if (cached) {
                    console.log('[SidebarManager] Using cached context');
                    try {
                        this.render(JSON.parse(cached));
                        return;
                    } catch (e) {
                        console.error('Error parsing cached sidebar context', e);
                        sessionStorage.removeItem('sidebarContext');
                    }
                }
                this.fetch();
            },
            fetch: function() {
                console.log('[SidebarManager] Fetching fresh context...');
                contextApi.getAccountContext()
                    .then(data => {
                        console.log('[SidebarManager] Context received:', data);
                        sessionStorage.setItem('sidebarContext', JSON.stringify(data));
                        this.render(data);
                    })
                    .catch(err => console.error('Sidebar Context Error:', err));
            },
            render: function(data) {
                console.log('[SidebarManager] Rendering with data:', data);
                // Update Restaurant Name
                const restNameEl = document.getElementById('sidebarRestaurantName');
                if (restNameEl) {
                    restNameEl.textContent = data.restaurantName;
                    restNameEl.classList.remove('skeleton', 'skeleton-text');
                    restNameEl.style.cssText = 'display: block; font-size: 0.75rem; color: var(--muted); font-weight: 400;';
                }

                // Update User Info
                const userNameEl = document.querySelector('.user-name');
                const userEmailEl = document.querySelector('.user-email');
                const userAvatarEl = document.querySelector('.user-avatar');
                if (userNameEl) {
                    userNameEl.textContent = data.userName;
                    userNameEl.classList.remove('skeleton', 'skeleton-text');
                    userNameEl.style.cssText = '';
                }
                if (userEmailEl) {
                    userEmailEl.textContent = data.userEmail;
                    userEmailEl.classList.remove('skeleton', 'skeleton-text');
                    userEmailEl.style.cssText = '';
                }
                if (userAvatarEl) {
                    userAvatarEl.textContent = data.userAvatar;
                    userAvatarEl.classList.remove('skeleton', 'skeleton-avatar');
                }

                // Update Sidebar Nav
                const navList = document.getElementById('sidebarNavList');
                if (navList) {
                    const currentModuleName = this.currentModuleName;
                    navList.innerHTML = data.sidebarModules.map(m => `
                        <li>
                            <a href="${m.href}" class="nav-item ${m.name === currentModuleName ? 'active' : ''}">
                                ${m.icon}
                                <span>${m.label}</span>
                                ${this.getBadgeHtml(m.name)}
                                <span class="nav-tooltip">${m.label}</span>
                            </a>
                        </li>
                    `).join('');
                }

                // Update Footer Modules
                const footerModulesList = document.getElementById('userSubmenu');
                if (footerModulesList) {
                    const currentModuleName = this.currentModuleName;
                    const divider = footerModulesList.querySelector('.user-submenu-divider');
                    const logoutForm = footerModulesList.querySelector('#logoutForm');
                    const logoutBtn = footerModulesList.querySelector('.danger');
                    
                    let html = data.footerModules.map(m => `
                        <a href="${m.href}" class="user-submenu-item ${m.name === currentModuleName ? 'active' : ''}">
                            ${m.icon}
                            <span>${m.label}</span>
                        </a>
                    `).join('');
                    
                    if (divider) html += divider.outerHTML;
                    if (logoutForm) html += logoutForm.outerHTML;
                    if (logoutBtn) html += logoutBtn.outerHTML;
                    
                    footerModulesList.innerHTML = html;
                }
            },
            getBadgeHtml: function(moduleName) {
                if (moduleName === 'ORDERS') return '<span id="ordersBadge" class="nav-badge" style="display: none">0</span>';
                if (moduleName === 'TABLES') return '<span id="tablesBadge" class="nav-badge" style="display: none">0</span>';
                if (moduleName === 'FEEDBACKS') return '<span id="feedbacksBadge" class="nav-badge" style="display: none">0</span>';
                return '';
            },
            clearCache: function() {
                sessionStorage.removeItem('sidebarContext');
            }
        };

        window.SidebarManager = SidebarManager;

        const currentModuleName = /*[[${module != null ? module.name() : ''}]]*/ '';
        SidebarManager.init(currentModuleName);
    </script>

    <script th:inline="javascript">
    // Sidebar functions
    function openSidebar() {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('sidebarOverlay').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('open');
        document.body.style.overflow = '';
    }

    // Sidebar Toggle (collapse/expand)
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.querySelector('.main-content');
        const isCollapsed = sidebar.classList.toggle('collapsed');

        if (mainContent) {
            mainContent.classList.toggle('sidebar-collapsed', isCollapsed);
        }

        // Save preference to localStorage
        localStorage.setItem('sidebarCollapsed', isCollapsed ? 'true' : 'false');
    }

    // User Menu
    function toggleUserMenu() {
        const container = document.getElementById('userMenuContainer');
        container.classList.toggle('open');
    }

    // Close user menu when clicking outside
    document.addEventListener('click', function(e) {
        const container = document.getElementById('userMenuContainer');
        if (container && !container.contains(e.target)) {
            container.classList.remove('open');
        }
    });

    // Initialize sidebar state from localStorage
    function initSidebarState() {
        const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.querySelector('.main-content');

        if (isCollapsed && window.innerWidth >= 1024) {
            sidebar.classList.add('collapsed');
            if (mainContent) {
                mainContent.classList.add('sidebar-collapsed');
            }
        }
    }

    {
        const restaurantId = /*[[${context.restaurant.id}]]*/ null;
        const contextData = /*[[${context}]]*/ null;
        const alertSoundUrl = /*[[@{/media/alert.wav}]]*/ '/media/alert.wav';
        
        const updateOrdersBadge = () => {
            const badge = document.getElementById('ordersBadge');
            if (!badge) {
                console.warn('Orders badge element not found');
                return;
            }
            
            fetch('/api/v1/manager/orders/count/pending', {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
                .then(res => {
                    if (!res.ok) throw new Error('Status ' + res.status);
                    return res.json();
                })
                .then(count => {
                    badge.textContent = count;
                    if (count > 0) {
                        badge.style.display = '';
                    } else {
                        badge.style.display = 'none';
                    }
                })
                .catch(err => console.error('Error updating orders badge:', err));
        }
    const updateTablesBadge = () => {
        const badge = document.getElementById('tablesBadge');
        if (!badge) {
            console.warn('Tables badge element not found');
            return;
        }
        
        fetch('/api/notifications/push/calls/count', {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
            .then(res => {
                if (!res.ok) throw new Error('Status ' + res.status);
                return res.json();
            })
            .then(count => {
                badge.textContent = count;
                if (count > 0) {
                    badge.style.display = '';
                } else {
                    badge.style.display = 'none';
                }
            })
            .catch(err => console.error('Error updating tables badge:', err));
    }

        const updateFeedbacksBadge = () => {
            const badge = document.getElementById('feedbacksBadge');
            if (!badge) return;
            
            fetch('/api/v1/manager/feedbacks/count/unread', {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
                .then(res => {
                    if (!res.ok) throw new Error('Status ' + res.status);
                    return res.json();
                })
                .then(count => {
                    badge.textContent = count;
                    if (count > 0) {
                        badge.style.display = '';
                    } else {
                        badge.style.display = 'none';
                    }
                })
                .catch(err => console.error('Error updating feedbacks badge:', err));
        }

        let sidebarEventSource = null;
        const connectSidebarSSE = () => {
            if (sidebarEventSource) sidebarEventSource.close();
            
            sidebarEventSource = new EventSource('/api/notifications/sse/subscribe/' + restaurantId);
            
            // Initial update
            updateOrdersBadge();
            updateTablesBadge();
            updateFeedbacksBadge();

            sidebarEventSource.onmessage = function(event) {
                try {
                    const payload = JSON.parse(event.data);
                    const type = payload.type;
                    
                    // New Ticket or Status alert
                    if (type === 'TICKET_CREATED') {
                        const initiatedBy = payload.initiatedBy;
                        const currentUserId = contextData && contextData.user ? contextData.user.id : null;
                        
                        // Only play sound if it's not initiated by the current user
                        if (initiatedBy !== currentUserId) {
                            const soundEnabled = localStorage.getItem('soundEnabled') !== 'false';
                            if (soundEnabled) {
                                const audio = new Audio(alertSoundUrl);
                                audio.play().catch(e => console.log('Audio blocked', e));
                            }
                        } else {
                            console.log('Self-initiated ticket, skipping sound');
                        }
                    }

                    if (type === 'TICKET_CREATED' || type === 'TICKET_STATUS_CHANGED') {
                        updateOrdersBadge();
                    }
                    
                    // Waiter Call alerts
                    if (type === 'WAITER_CALL' || type === 'WAITER_CALL_DISMISSED') {
                        if (type === 'WAITER_CALL') {
                            const soundEnabled = localStorage.getItem('soundEnabled') !== 'false';
                            if (soundEnabled) {
                                const audio = new Audio(alertSoundUrl);
                                audio.play().catch(e => console.log('Audio blocked', e));
                            }
                        }
                        updateTablesBadge();
                    }

                    if (type === 'FEEDBACK_SUBMITTED') {
                        updateFeedbacksBadge();
                    }

                } catch (e) {
                    console.error('Error parsing Sidebar SSE data:', e);
                }
            };

            sidebarEventSource.addEventListener('error', function(e) {
                if (e.readyState == EventSource.CLOSED) {
                    console.log('Sidebar SSE connection closed, retrying...');
                    sidebarEventSource = null;
                    setTimeout(connectSidebarSSE, 5000);
                }
            });
        }

        // Run on page load
        document.addEventListener('DOMContentLoaded', () => {
            initSidebarState();
            if (typeof PushNotifications !== 'undefined' && typeof PushNotifications.syncWithServer === 'function') {
                PushNotifications.syncWithServer();
            }
            if (restaurantId) {
                console.log('Attempting to connect sidebar SSE...');
                setTimeout(connectSidebarSSE, 100);
            } else {
                console.warn('Sidebar: restaurantId not found, SSE will not connect');
            }
        });
    }

</script>

    </th:block>
</th:block>
</html>
