<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="sidebar(pageTitle, extraContent, showHeaderOnLg)">
    <th:block th:with="showHeaderOnLg=${showHeaderOnLg == null ? true : showHeaderOnLg}">

<!-- Sidebar Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
    <!-- Toggle Button -->
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Recolher menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </button>

    <div class="sidebar-header" style="display: flex; align-items: center; justify-content: space-between;">
        <a href="/dashboard" class="logo">
            <div class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
            </div>
            <div class="logo-text">
                <span style="font-size: 1rem;" th:text="#{app.name}">TableSplit</span>
                <span style="display: block; font-size: 0.75rem; color: var(--muted); font-weight: 400; background: none; -webkit-background-clip: unset; -webkit-text-fill-color: var(--muted); background-clip: unset;" th:text="${context.restaurant.name}">My Restaurant</span>
            </div>
        </a>
        <button class="sidebar-close" onclick="closeSidebar()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
    </div>

    <nav class="sidebar-nav">
        <ul>
            <li th:each="m : ${context.sidebarModules}">
                <a th:href="${m.getHref()}" class="nav-item" th:classappend="${module.name() == m.name()} ? ' active'">
                    <div th:utext="${m.icon}"></div>
                    <span th:text="#{${m.name}}">Dashboard</span>
                    <span th:if="${m.name() == 'ORDERS'}" id="ordersBadge" class="nav-badge" 
                          th:text="${context.pendingOrdersCount}" 
                          th:style="${context.pendingOrdersCount == 0 ? 'display: none' : ''}">0</span>
                    <span th:if="${m.name() == 'TABLES'}" id="tablesBadge" class="nav-badge" 
                          th:text="${context.waiterCallCount}" 
                          th:style="${context.waiterCallCount == 0 ? 'display: none' : ''}">0</span>
                    <span class="nav-tooltip" th:text="#{${m.name}}">Dashboard</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="sidebar-footer">
        <div class="user-menu-container" id="userMenuContainer">
            <button class="user-menu-trigger" onclick="toggleUserMenu()">
                <div class="user-avatar">TO</div>
                <div class="user-details">
                    <div class="user-name" th:text="${context.user.name}">Thiago Oliveira</div>
                    <div class="user-email" th:text="${context.user.email}">thiago.oliveira@email.com</div>
                </div>
                <svg class="user-menu-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
            </button>
            <div class="user-submenu">
                <a th:href="${m.getHref()}" class="user-submenu-item" th:each="m : ${context.footerModules}">
                    <div th:utext="${m.icon}"></div>
                    <span th:text="#{${m.name}}">User Profile</span>
                </a>
                <div class="user-submenu-divider"></div>
                <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;"></form>
                <a href="#" onclick="document.getElementById('logoutForm').submit()" class="user-submenu-item danger">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
                    Sair
                </a>
            </div>
        </div>
    </div>
</aside>

<!-- Header -->
<header class="dashboard-header" th:classappend="${!showHeaderOnLg} ? 'lg-hidden'">
    <div class="dashboard-header-content">
        <div class="flex items-center gap-3" style="flex: 1;">
            <button class="hamburger-btn" onclick="openSidebar()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
            </button>
            <div class="lg-hidden flex items-center gap-3">
                <div class="logo-icon" style="width: 2rem; height: 2rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>
                </div>
                <span style="font-weight: 700;" th:text="${pageTitle}">Title</span>
            </div>
        </div>
        <div style="flex: 1; display: flex; justify-content: center;">
            <h1 class="hidden lg-block" style="font-size: 1.25rem; font-weight: 600; margin: 0;" th:text="${pageTitle}">Title</h1>
        </div>
        <div style="flex: 1; display: flex; justify-content: flex-end;">
            <th:block th:if="${extraContent != null}">
                <th:block th:replace="${extraContent}"></th:block>
            </th:block>
        </div>
    </div>
</header>

    <script src="/js/push-notifications.js?v=20260403-2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script th:inline="javascript">
    // Sidebar functions
    function openSidebar() {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('sidebarOverlay').classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('open');
        document.body.style.overflow = '';
    }

    // Sidebar Toggle (collapse/expand)
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.querySelector('.main-content');
        const isCollapsed = sidebar.classList.toggle('collapsed');

        if (mainContent) {
            mainContent.classList.toggle('sidebar-collapsed', isCollapsed);
        }

        // Save preference to localStorage
        localStorage.setItem('sidebarCollapsed', isCollapsed ? 'true' : 'false');
    }

    // User Menu
    function toggleUserMenu() {
        const container = document.getElementById('userMenuContainer');
        container.classList.toggle('open');
    }

    // Close user menu when clicking outside
    document.addEventListener('click', function(e) {
        const container = document.getElementById('userMenuContainer');
        if (container && !container.contains(e.target)) {
            container.classList.remove('open');
        }
    });

    // Initialize sidebar state from localStorage
    function initSidebarState() {
        const isCollapsed = localStorage.getItem('sidebarCollapsed') === 'true';
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.querySelector('.main-content');

        if (isCollapsed && window.innerWidth >= 1024) {
            sidebar.classList.add('collapsed');
            if (mainContent) {
                mainContent.classList.add('sidebar-collapsed');
            }
        }
    }

    {
        const restaurantId = /*[[${context.restaurant.id}]]*/ null;
        const contextData = /*[[${context}]]*/ null;
        console.log('Sidebar Context:', contextData);
        const alertSoundUrl = /*[[@{/sounds/alert.mp3}]]*/ '/sounds/alert.mp3';
        
        const updateOrdersBadge = () => {
            const badge = document.getElementById('ordersBadge');
            if (!badge) {
                console.warn('Orders badge element not found');
                return;
            }
            
            fetch('/orders/count/pending', {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
                .then(res => {
                    if (!res.ok) throw new Error('Status ' + res.status);
                    return res.json();
                })
                .then(count => {
                    console.log('Orders count fetched:', count);
                    badge.textContent = count;
                    if (count > 0) {
                        badge.style.display = '';
                    } else {
                        badge.style.display = 'none';
                    }
                })
                .catch(err => console.error('Error updating orders badge:', err));
        }

        const updateTablesBadge = () => {
            const badge = document.getElementById('tablesBadge');
            if (!badge) {
                console.warn('Tables badge element not found');
                return;
            }
            
            fetch('/api/notifications/calls/count', {
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            })
                .then(res => {
                    if (!res.ok) throw new Error('Status ' + res.status);
                    return res.json();
                })
                .then(count => {
                    console.log('Tables count fetched:', count);
                    badge.textContent = count;
                    if (count > 0) {
                        badge.style.display = '';
                    } else {
                        badge.style.display = 'none';
                    }
                })
                .catch(err => console.error('Error updating tables badge:', err));
        }

        const connectSidebarWS = () => {
            if (typeof SockJS === 'undefined' || typeof Stomp === 'undefined') {
                setTimeout(connectSidebarWS, 500);
                return;
            }
            
            const socket = new SockJS('/ws');
            const stompClient = Stomp.over(socket);
            stompClient.debug = null;
            console.log('Connecting sidebar WS for restaurant:', restaurantId);
            stompClient.connect({}, function (frame) {
                console.log('Sidebar WS connected');
                
                // Initial update on connect
                updateOrdersBadge();
                updateTablesBadge();

                stompClient.subscribe('/topic/restaurant/' + restaurantId + '/tickets', function (message) {
                    const data = JSON.parse(message.body);
                    
                    // If it's a new ticket (no newStatus field)
                    if (data.id && !data.newStatus) {
                        const soundEnabled = localStorage.getItem('soundEnabled') !== 'false';
                        if (soundEnabled) {
                            const audio = new Audio(alertSoundUrl);
                            audio.play().catch(e => console.log('Audio blocked', e));
                        }
                    }
                    
                    // Refresh count for ANY ticket-related event (new, moved, cancelled)
                    updateOrdersBadge();
                });

                stompClient.subscribe('/topic/restaurant/' + restaurantId + '/waiter', function (message) {
                    const data = JSON.parse(message.body);
                    console.log('Waiter WS message received:', data);
                    
                    // If it's a new call (has tableCod)
                    if (data.tableCod && !data.callId) { // Wait, data.callId is present in Dismiss event
                        const soundEnabled = localStorage.getItem('soundEnabled') !== 'false';
                        if (soundEnabled) {
                            const audio = new Audio(alertSoundUrl);
                            audio.play().catch(e => console.log('Audio blocked', e));
                        }
                    }
                    
                    // Refresh count for waiter calls
                    if (data.totalCount !== undefined) {
                        const badge = document.getElementById('tablesBadge');
                        if (badge) {
                            console.log('Updating tables badge from WS data:', data.totalCount);
                            badge.textContent = data.totalCount;
                            if (data.totalCount > 0) {
                                badge.style.display = '';
                            } else {
                                badge.style.display = 'none';
                            }
                        }
                    } else {
                        console.log('totalCount missing in WS message, fetching...');
                        updateTablesBadge();
                    }
                });
            });
        }

        // Run on page load
        document.addEventListener('DOMContentLoaded', () => {
            initSidebarState();
            if (typeof PushNotifications !== 'undefined' && typeof PushNotifications.syncWithServer === 'function') {
                PushNotifications.syncWithServer();
            }
            console.log('Sidebar loaded, restaurantId:', restaurantId);
            if (restaurantId) {
                console.log('Attempting to connect sidebar WS...');
                setTimeout(connectSidebarWS, 100);
            } else {
                console.warn('Sidebar: restaurantId not found, WebSocket will not connect');
            }
        });
    }

</script>

    </th:block>
</th:block>
</html>
