databaseChangeLog:
  - changeSet:
      id: add-pending-user-password-resets-table
      author: thiago.oliveira
      changes:
        - createTable:
            schemaName: public
            tableName: pending_user_password_resets
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
