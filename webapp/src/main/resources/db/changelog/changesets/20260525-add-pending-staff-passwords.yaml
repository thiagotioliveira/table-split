databaseChangeLog:
  - changeSet:
      id: add-pending-staff-passwords-table
      author: thiago.oliveira
      changes:
        - createTable:
            tableName: pending_staff_passwords
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
