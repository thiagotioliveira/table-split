databaseChangeLog:
  - changeSet:
      id: add-pending-registrations-table
      author: thiago.oliveira
      changes:
        - createTable:
            tableName: pending_registrations
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: code
                  type: varchar(6)
                  constraints:
                    nullable: false
              - column:
                  name: registration_data
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
