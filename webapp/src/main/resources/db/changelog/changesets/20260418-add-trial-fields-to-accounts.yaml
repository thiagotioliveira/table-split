databaseChangeLog:
  - changeSet:
      id: 20260418-add-trial-fields-to-accounts
      author: antigravity
      changes:
        - addColumn:
            tableName: accounts
            columns:
              - column:
                  name: status
                  type: varchar(50)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: trial_used
                  type: boolean
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: trial_ends_at
                  type: TIMESTAMP
