databaseChangeLog:
  - changeSet:
      id: tenant-initial-consolidated
      author: antigravity
      changes:
        # 1. Localized Texts
        - createTable:
            tableName: localized_texts
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
        - createTable:
            tableName: localized_text_translations
            columns:
              - column:
                  name: localized_text_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: language
                  type: varchar(5)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: localized_text_translations
            baseColumnNames: localized_text_id
            referencedTableName: localized_texts
            referencedColumnNames: id
            constraintName: fk_localized_text_translations_texts

        # 2. Staff (Moved up because push_subscriptions depends on it)
        - createTable:
            tableName: staff
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: varchar(20)
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: language
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: boolean
                  constraints:
                    nullable: false
                  defaultValueBoolean: true
        - addForeignKeyConstraint:
            baseTableName: staff
            baseColumnNames: restaurant_id
            referencedTableName: restaurants
            referencedTableSchemaName: public
            referencedColumnNames: id
            constraintName: fk_staff_restaurant
        - createIndex:
            indexName: idx_staff_restaurant_id
            tableName: staff
            columns:
              - column:
                  name: restaurant_id
        - createIndex:
            indexName: idx_staff_email
            tableName: staff
            columns:
              - column:
                  name: email
        - createTable:
            tableName: staff_modules
            columns:
              - column:
                  name: staff_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: module
                  type: varchar(50)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: staff_modules
            baseColumnNames: staff_id
            referencedTableName: staff
            referencedColumnNames: id
            constraintName: fk_staff_modules_staff

        # 3. Categories
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: num_order
                  type: integer
                  constraints:
                    nullable: false
                  defaultValue: "0"
              - column:
                  name: name_localized_text_id
                  type: UUID
              - column:
                  name: active
                  type: boolean
        - addForeignKeyConstraint:
            baseTableName: categories
            baseColumnNames: name_localized_text_id
            referencedTableName: localized_texts
            referencedColumnNames: id
            constraintName: fk_categories_name_localized_texts
        - addForeignKeyConstraint:
            baseTableName: categories
            baseColumnNames: restaurant_id
            referencedTableName: restaurants
            referencedTableSchemaName: PUBLIC
            referencedColumnNames: id
            constraintName: fk_categories_restaurants
        - createIndex:
            indexName: idx_categories_restaurant_id
            tableName: categories
            columns:
              - column:
                  name: restaurant_id

        # 4. Items
        - createTable:
            tableName: items
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: category_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: name_localized_text_id
                  type: UUID
              - column:
                  name: description_localized_text_id
                  type: UUID
              - column:
                  name: price
                  type: decimal
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
        - addForeignKeyConstraint:
            baseTableName: items
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_items_categories
        - addForeignKeyConstraint:
            baseTableName: items
            baseColumnNames: name_localized_text_id
            referencedTableName: localized_texts
            referencedColumnNames: id
            constraintName: fk_items_name_localized_texts
        - addForeignKeyConstraint:
            baseTableName: items
            baseColumnNames: description_localized_text_id
            referencedTableName: localized_texts
            referencedColumnNames: id
            constraintName: fk_items_description_localized_texts

        # 5. Item Tags
        - createTable:
            tableName: item_tags
            columns:
              - column:
                  name: item_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_item_tags_item
                    referencedTableName: items
                    referencedColumnNames: id
              - column:
                  name: tag
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: item_tags
            columnNames: item_id, tag
            constraintName: pk_item_tags

        # 6. Item Images
        - createTable:
            tableName: item_images
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: item_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: main
                  type: boolean
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: item_images
            baseColumnNames: item_id
            referencedTableName: items
            referencedColumnNames: id
            constraintName: fk_item_images_item

        # 7. Tables
        - createTable:
            tableName: restaurant_tables
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: cod
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: restaurant_tables
            baseColumnNames: restaurant_id
            referencedTableName: restaurants
            referencedTableSchemaName: PUBLIC
            referencedColumnNames: id
            constraintName: fk_restaurant_tables_restaurants

        # 8. Orders
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: table_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: opened_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: closed_at
                  type: TIMESTAMP
              - column:
                  name: service_fee
                  type: smallint
                  constraints:
                    nullable: false
                  defaultValueNumeric: 0
        - addForeignKeyConstraint:
            baseTableName: orders
            baseColumnNames: restaurant_id
            referencedTableName: restaurants
            referencedTableSchemaName: PUBLIC
            referencedColumnNames: id
            constraintName: fk_orders_restaurants
        - addForeignKeyConstraint:
            baseTableName: orders
            baseColumnNames: table_id
            referencedTableName: restaurant_tables
            referencedColumnNames: id
            constraintName: fk_orders_restaurant_tables

        # 9. Order Customers
        - createTable:
            tableName: order_customers
            columns:
              - column:
                  name: order_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: customer_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: customer_name
                  type: varchar(100)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: order_customers
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: id
            constraintName: fk_order_customers_orders

        # 10. Tickets
        - createTable:
            tableName: tickets
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: ready_at
                  type: TIMESTAMP
              - column:
                  name: note
                  type: varchar(255)
        - addForeignKeyConstraint:
            baseTableName: tickets
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: id
            constraintName: fk_tickets_orders

        # 11. Ticket Items
        - createTable:
            tableName: ticket_items
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: ticket_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: item_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: name_localized_text_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: unit_price
                  type: decimal
                  constraints:
                    nullable: false
              - column:
                  name: note
                  type: TEXT
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
                  defaultValue: 'PENDING'
              - column:
                  name: customer_id
                  type: UUID
        - addForeignKeyConstraint:
            baseTableName: ticket_items
            baseColumnNames: ticket_id
            referencedTableName: tickets
            referencedColumnNames: id
            constraintName: fk_ticket_items_tickets
        - addForeignKeyConstraint:
            baseTableName: ticket_items
            baseColumnNames: item_id
            referencedTableName: items
            referencedColumnNames: id
            constraintName: fk_ticket_items_items
        - addForeignKeyConstraint:
            baseTableName: ticket_items
            baseColumnNames: name_localized_text_id
            referencedTableName: localized_texts
            referencedColumnNames: id
            constraintName: fk_ticket_items_localized_text

        # 12. Payments
        - createTable:
            tableName: payments
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: customer_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: decimal
                  constraints:
                    nullable: false
              - column:
                  name: paid_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: method
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: note
                  type: varchar(255)
        - addForeignKeyConstraint:
            baseTableName: payments
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: id
            constraintName: fk_payments_orders

        # 13. Promotions Module
        - createTable:
            tableName: promotions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: discount_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: discount_value
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: min_order_value
                  type: DECIMAL(19, 2)
              - column:
                  name: start_date
                  type: TIMESTAMP
              - column:
                  name: end_date
                  type: TIMESTAMP
              - column:
                  name: active
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: start_time
                  type: TIME
              - column:
                  name: end_time
                  type: TIME
              - column:
                  name: apply_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
        - createTable:
            tableName: promotion_applicable_ids
            columns:
              - column:
                  name: promotion_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: applicable_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: promotion_applicable_ids
            baseColumnNames: promotion_id
            referencedTableName: promotions
            referencedColumnNames: id
            constraintName: fk_promo_applicable_ids_promo
        - createTable:
            tableName: promotion_recurrence_days
            columns:
              - column:
                  name: promotion_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: day_of_week
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: promotion_recurrence_days
            baseColumnNames: promotion_id
            referencedTableName: promotions
            referencedColumnNames: id
            constraintName: fk_promo_recurrence_days_promo

        - createTable:
            tableName: combos
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: combo_price
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: start_date
                  type: TIMESTAMP
              - column:
                  name: end_date
                  type: TIMESTAMP
              - column:
                  name: active
                  type: BOOLEAN
                  constraints:
                    nullable: false
        - createTable:
            tableName: combo_items
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: combo_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: item_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: combo_items
            baseColumnNames: combo_id
            referencedTableName: combos
            referencedColumnNames: id
            constraintName: fk_combo_items_combo

        - createTable:
            tableName: coupons
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: discount_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: discount_value
                  type: DECIMAL(19, 2)
              - column:
                  name: free_item_id
                  type: UUID
              - column:
                  name: min_order_value
                  type: DECIMAL(19, 2)
              - column:
                  name: valid_date
                  type: DATE
              - column:
                  name: usage_limit
                  type: INT
              - column:
                  name: used_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  constraints:
                    nullable: false
        - createTable:
            tableName: coupon_rules
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: coupon_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: rule_value
                  type: TEXT
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: coupon_rules
            baseColumnNames: coupon_id
            referencedTableName: coupons
            referencedColumnNames: id
            constraintName: fk_coupon_rules_coupon

        # 14. Push Subscriptions (REFERENCES staff)
        - createTable:
            tableName: push_subscriptions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: true
              - column:
                  name: staff_id
                  type: UUID
                  constraints:
                    nullable: true
              - column:
                  name: endpoint
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: p256dh
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: auth
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: notify_new_orders
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: notify_call_waiter
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: push_subscriptions
            baseColumnNames: restaurant_id
            referencedTableName: restaurants
            referencedTableSchemaName: PUBLIC
            referencedColumnNames: id
            constraintName: fk_push_sub_restaurant
        - addForeignKeyConstraint:
            baseTableName: push_subscriptions
            baseColumnNames: user_id
            referencedTableName: users
            referencedTableSchemaName: PUBLIC
            referencedColumnNames: id
            constraintName: fk_push_subscriptions_users
        - addForeignKeyConstraint:
            baseTableName: push_subscriptions
            baseColumnNames: staff_id
            referencedTableName: staff
            referencedColumnNames: id
            constraintName: fk_push_subscriptions_staff

        # 15. Waiter Calls
        - createTable:
            tableName: waiter_calls
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: table_cod
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: call_count
                  type: integer
                  constraints:
                    nullable: false
                  defaultValueNumeric: 1
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: dismissed_at
                  type: TIMESTAMP
        - createIndex:
            indexName: idx_waiter_calls_restaurant_table
            tableName: waiter_calls
            columns:
              - column:
                  name: restaurant_id
              - column:
                  name: table_cod
  - include:
      file: db/changelog/changesets/20260407-make-payment-customer-nullable.yaml
  - include:
      file: db/changelog/changesets/20260408-make-ticket-item-name-nullable.yaml
  - include:
      file: db/changelog/changesets/20260409-add-deleted-at-to-items.yaml
  - include:
      file: db/changelog/changesets/20260410-remove-name-from-ticket-items.yaml
  - include:
      file: db/changelog/changesets/20260411-add-promotion-fields-to-ticket-items.yaml
  - include:
      file: db/changelog/changesets/20260411-fix-ticket-items-unit-price-scale.yaml
  - include:
      file: db/changelog/changesets/20260411-add-deleted-at-to-restaurant-tables.yaml
  - include:
      file: db/changelog/changesets/20260411-add-feedback-and-ratings.yaml
  - include:
      file: db/changelog/changesets/20260425-add-questions-to-items.yaml
