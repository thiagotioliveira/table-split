spring:
  application:
    name: table-split-cleaner
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tablesplit}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

cleaner:
  # Retention period in days
  retention-days: ${CLEANER_RETENTION_DAYS:90}
  
  # Enable/disable the cleaner
  enabled: ${CLEANER_ENABLED:true}

app:
  version: "@project.version@"
  time:
    zone-id: ${APP_TIME_ZONE_ID:Europe/Lisbon}

logging:
  level:
    dev.thiagooliveira.tablesplit.cleaner: DEBUG
