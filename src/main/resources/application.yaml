spring:
  profiles:
    active: h2
  application:
    name: table-split
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 31536000
      chain:
        strategy:
          content:
            enabled: true
            paths: /**
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        multiTenancy: SCHEMA
        connection:
          provider_disables_autocommit: true
  messages:
    basename: messages
    encoding: UTF-8

cloudinary:
  cloud-name:
  api-key:
  api-secret:
  root-folder: dev

app:
  version: "@project.version@"
  time:
    zone-id: Europe/Lisbon
  menu:
    item:
      image:
        max-size: 1048576 #1MB
  gallery:
    image:
      max-size: 1048576 #1MB
  push:
    public-key:
    private-key:
    subject: mailto:info@tablesplit.com

logging:
  level:
    ROOT: INFO
    org:
      hibernate:
        SQL: INFO
        type:
          descriptor:
            sql:
              BasicBinder: INFO
      springframework:
        transaction: OFF
    dev.thiagooliveira: INFO
    liquibase: OFF

management:
  endpoints:
    web:
      exposure:
        include: health