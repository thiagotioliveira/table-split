spring:
  application:
    name: table-split
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 31536000
      chain:
        strategy:
          content:
            enabled: true
            paths: /**
  datasource:
    url: jdbc:h2:mem:table-split
  jpa:
    properties:
      hibernate:
        format_sql: false
  messages:
    basename: messages
    encoding: UTF-8

cloudinary:
  cloud-name:
  api-key:
  api-secret:
  root-folder: dev

app:
  time:
    zone-id: Europe/Lisbon

logging:
  level:
    ROOT: INFO
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE
      springframework:
        transaction: OFF
    dev.thiagooliveira: DEBUG