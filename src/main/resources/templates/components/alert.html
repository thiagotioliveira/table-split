<div th:fragment="alert">

<style th:if="${alert != null}">
    /* Alert */
    .alert {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
        padding: 1rem;
        border-radius: var(--radius);
        margin-bottom: 1.5rem;
    }

    .alert svg {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
    }

    .alert-success {
        background: var(--green-light);
        color: var(--green);
    }

    .alert-content {
        flex: 1;
    }

    .alert-title {
        font-weight: 600;
        margin-bottom: 0.125rem;
    }

    .alert-message {
        font-size: 0.875rem;
        opacity: 0.9;
    }

    .alert.hidden {
        display: none;
    }
</style>

<div class="alert mb-1" role="alert" th:if="${false && alert != null}"
     th:classappend="${alert.getType() == 'success' ? 'alert-success' : (alert.getType() == 'error' ? 'alert-danger' : 'alert-warning')}"
     th:text="#{${alert.getMessage()}}">
</div>

<!-- Success Alert -->
<div class="alert alert-success hidden" id="successAlert" th:if="${alert != null}">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    <div class="alert-content">
        <div class="alert-title">Alterações salvas!</div>
        <div class="alert-message" th:text="#{${alert.getMessage()}}">Suas informações foram atualizadas com sucesso.</div>
    </div>
</div>

<script th:inline="javascript">
    // Success alert
    const showAlert = /*[[${alert != null}]]*/false;

    // Success alert
    function showSuccessAlert() {
        const alert = document.getElementById('successAlert');
        alert.classList.remove('hidden');

        setTimeout(() => {
            alert.classList.add('hidden');
        }, 6000);
    }

    if(showAlert) {
        document.addEventListener('DOMContentLoaded', showSuccessAlert);
    }
</script>

</div>
