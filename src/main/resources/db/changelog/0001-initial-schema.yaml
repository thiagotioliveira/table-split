databaseChangeLog:
  - changeSet:
      id: 0001-restaurants-table
      author: thiagooliveira
      changes:
        - createTable:
            tableName: restaurants
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
#              - column:
#                  name: created_at
#                  type: TIMESTAMP
#                  constraints:
#                    nullable: false
#              - column:
#                  name: deleted_at
#                  type: TIMESTAMP
#                  constraints:
#                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: website
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: phone
                  type: varchar(20)
                  constraints:
                    nullable: true
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: address
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: cuisine_type
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: tags
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: default_language
                  type: varchar(5)
                  constraints:
                    nullable: false
              - column:
                  name: customer_languages
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: varchar(3)
                  constraints:
                    nullable: false
              - column:
                  name: service_fee
                  type: smallint
                  constraints:
                    nullable: false
              - column:
                  name: average_price
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: days
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: hash_primary_color
                  type: varchar(7)
                  constraints:
                    nullable: false
              - column:
                  name: hash_accent_color
                  type: varchar(7)
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_restaurants_slug
            tableName: restaurants
            unique: true
            columns:
              - column:
                  name: slug
  - changeSet:
      id: 0002-categories-table
      author: thiagooliveira
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: num_order
                  type: integer
                  constraints:
                    nullable: false
                  defaultValue: "0"
              - column:
                  name: name
                  type: TEXT
        - addForeignKeyConstraint:
            baseTableName: categories
            baseColumnNames: restaurant_id
            referencedTableName: restaurants
            referencedColumnNames: id
            constraintName: fk_categories_restaurants
  - changeSet:
      id: 0003-items-table
      author: thiagooliveira
      changes:
        - createTable:
            tableName: items
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: category_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: TEXT
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: price
                  type: decimal
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: items
            baseColumnNames: category_id
            referencedTableName: categories
            referencedColumnNames: id
            constraintName: fk_items_categories