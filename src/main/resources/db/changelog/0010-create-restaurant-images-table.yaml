databaseChangeLog:
  - changeSet:
      id: create-restaurant-images-table
      author: thiago.oliveira
      changes:
        - createTable:
            tableName: restaurant_images
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: cover
                  type: boolean
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: restaurant_images
            baseColumnNames: restaurant_id
            referencedTableName: restaurants
            referencedColumnNames: id
            constraintName: fk_restaurant_images_restaurant
