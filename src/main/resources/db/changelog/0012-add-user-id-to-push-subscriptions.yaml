databaseChangeLog:
  - changeSet:
      id: add-user-and-staff-id-to-push-subscriptions
      author: antigravity
      changes:
        - addColumn:
            tableName: push_subscriptions
            columns:
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: true
              - column:
                  name: staff_id
                  type: UUID
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: push_subscriptions
            baseColumnNames: user_id
            referencedTableName: users
            referencedTableSchemaName: PUBLIC
            referencedColumnNames: id
            constraintName: fk_push_subscriptions_users
        - addForeignKeyConstraint:
            baseTableName: push_subscriptions
            baseColumnNames: staff_id
            referencedTableName: staff
            referencedColumnNames: id
            constraintName: fk_push_subscriptions_staff
