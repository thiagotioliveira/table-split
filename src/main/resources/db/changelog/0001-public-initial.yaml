databaseChangeLog:
  - changeSet:
      id: create-account-table
      author: thiago.oliveira
      changes:
        - createTable:
            tableName: accounts
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: plan
                  type: varchar(50)
                  constraints:
                    nullable: false
  - changeSet:
      id: create-user-table
      author: thiago.oliveira
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: account_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: first_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: phone
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: language
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(50)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: users
            baseColumnNames: account_id
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_users_accounts
  - changeSet:
      id: create-restaurants-table
      author: thiago.oliveira
      changes:
        - createTable:
            tableName: restaurants
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: account_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: slug
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: website
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: phone
                  type: varchar(20)
                  constraints:
                    nullable: true
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: address
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: cuisine_type
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: tags
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: default_language
                  type: varchar(5)
                  constraints:
                    nullable: false
              - column:
                  name: customer_languages
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: currency
                  type: varchar(3)
                  constraints:
                    nullable: false
              - column:
                  name: service_fee
                  type: smallint
                  constraints:
                    nullable: false
              - column:
                  name: average_price
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: days
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: hash_primary_color
                  type: varchar(7)
                  constraints:
                    nullable: false
              - column:
                  name: hash_accent_color
                  type: varchar(7)
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_restaurants_slug
            tableName: restaurants
            unique: true
            columns:
              - column:
                  name: slug
        - addForeignKeyConstraint:
            baseTableName: restaurants
            baseColumnNames: account_id
            referencedTableName: accounts
            referencedColumnNames: id
            constraintName: fk_restaurants_accounts
