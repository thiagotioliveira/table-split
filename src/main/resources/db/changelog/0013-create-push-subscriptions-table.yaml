databaseChangeLog:
  - changeSet:
      id: 0013-create-push-subscriptions-table
      author: antigravity
      changes:
        - createTable:
            tableName: push_subscriptions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_push_sub_restaurant
                    referencedTableName: restaurants
                    referencedColumnNames: id
              - column:
                  name: endpoint
                  type: VARCHAR(512)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: p256dh
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: auth
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
