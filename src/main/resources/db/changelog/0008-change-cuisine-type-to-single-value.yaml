databaseChangeLog:
  - changeSet:
      id: change-cuisine-type-to-single-value
      author: thiago.oliveira
      changes:
        - sql:
            dbms: postgresql
            sql: UPDATE restaurants SET cuisine_type = cuisine_type::jsonb->>0;
        - sql:
            dbms: h2
            sql: UPDATE restaurants SET cuisine_type = REGEXP_REPLACE(cuisine_type, '[\[\]" ]', '', 'g')
        # Note: The above H2 regex is primitive and assumes no commas in the name. 
        # For a more robust H2 migration, we'd need more complex logic, but for simple enums it might work.
        # Actually, let's use a more standard approach if possible.
        - modifyDataType:
            tableName: restaurants
            columnName: cuisine_type
            newDataType: varchar(50)
        - addNotNullConstraint:
            tableName: restaurants
            columnName: cuisine_type
            columnDataType: varchar(50)
            defaultNullValue: 'CONTEMPORARY'
            constraints:
              nullable: true
        # Wait, the user said "podendo ser null", so I should remove the notNull constraint if it exists.
        - dropNotNullConstraint:
            tableName: restaurants
            columnName: cuisine_type
            columnDataType: varchar(50)
