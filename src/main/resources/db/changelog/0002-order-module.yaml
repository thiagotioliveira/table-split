databaseChangeLog:
  - changeSet:
      id: create-tables-table
      author: thiago.oliveira
      changes:
        - createTable:
            tableName: tables
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: cod
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: tables
            baseColumnNames: restaurant_id
            referencedTableName: restaurants
            referencedColumnNames: id
            constraintName: fk_tables_restaurants
  - changeSet:
      id: create-orders-table
      author: thiago.oliveira
      changes:
        - createTable:
            tableName: orders
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: table_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: opened_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: closed_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: orders
            baseColumnNames: restaurant_id
            referencedTableName: restaurants
            referencedColumnNames: id
            constraintName: fk_orders_restaurants
        - addForeignKeyConstraint:
            baseTableName: orders
            baseColumnNames: table_id
            referencedTableName: tables
            referencedColumnNames: id
            constraintName: fk_orders_tables
  - changeSet:
      id: create-order-items-table
      author: thiago.oliveira
      changes:
        - createTable:
            tableName: order_items
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: item_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: name_localized_text_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: customer_name
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: integer
                  constraints:
                    nullable: false
              - column:
                  name: unit_price
                  type: decimal
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: order_items
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: id
            constraintName: fk_order_items_orders
        - addForeignKeyConstraint:
            baseTableName: order_items
            baseColumnNames: item_id
            referencedTableName: items
            referencedColumnNames: id
            constraintName: fk_order_items_items
        - addForeignKeyConstraint:
            baseTableName: order_items
            baseColumnNames: name_localized_text_id
            referencedTableName: localized_texts
            referencedColumnNames: id
            constraintName: fk_order_items_localized_text
