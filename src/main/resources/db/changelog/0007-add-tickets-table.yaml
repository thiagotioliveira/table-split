databaseChangeLog:
  - changeSet:
      id: create-tickets-table
      author: antigravity
      changes:
        - createTable:
            tableName: tickets
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: ready_at
                  type: TIMESTAMP
                  constraints:
                    nullable: true
              - column:
                  name: note
                  type: text
                  constraints:
                    nullable: true
        - addForeignKeyConstraint:
            baseTableName: tickets
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: id
            constraintName: fk_tickets_orders
  - changeSet:
      id: migrate-items-to-tickets
      author: antigravity
      changes:
        - sql:
            dbms: postgresql, h2
            sql: |
              -- For each unique order that has items, create a ticket
              INSERT INTO tickets (id, order_id, status, created_at)
              SELECT DISTINCT 
                  random_uuid(), 
                  order_id, 
                  'PENDING', 
                  CURRENT_TIMESTAMP
              FROM order_items;

              -- Add ticket_id column to order_items
              ALTER TABLE order_items ADD COLUMN ticket_id UUID;

              -- Link order_items to the newly created tickets
              UPDATE order_items oi
              SET ticket_id = t.id
              FROM tickets t
              WHERE oi.order_id = t.order_id;
        - addNotNullConstraint:
            tableName: order_items
            columnName: ticket_id
            columnDataType: UUID
        - addForeignKeyConstraint:
            baseTableName: order_items
            baseColumnNames: ticket_id
            referencedTableName: tickets
            referencedColumnNames: id
            constraintName: fk_order_items_tickets
        - dropForeignKeyConstraint:
            baseTableName: order_items
            constraintName: fk_order_items_orders
        - dropColumn:
            tableName: order_items
            columnName: order_id
