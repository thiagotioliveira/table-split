databaseChangeLog:
  - changeSet:
      id: 0011-1
      author: antigravity
      changes:
        - createTable:
            tableName: promotions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: discount_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: discount_value
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: min_order_value
                  type: DECIMAL(19, 2)
              - column:
                  name: start_date
                  type: TIMESTAMP
              - column:
                  name: end_date
                  type: TIMESTAMP
              - column:
                  name: active
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: recurrence_type
                  type: VARCHAR(20)
              - column:
                  name: start_time
                  type: TIME
              - column:
                  name: end_time
                  type: TIME
              - column:
                  name: apply_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: applicable_id
                  type: UUID

  - changeSet:
      id: 0011-2
      author: antigravity
      changes:
        - createTable:
            tableName: promotion_recurrence_days
            columns:
              - column:
                  name: promotion_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_promo_recurrence_days_promo
                    referencedTableName: promotions
                    referencedColumnNames: id
              - column:
                  name: day_of_week
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

  - changeSet:
      id: 0011-3
      author: antigravity
      changes:
        - createTable:
            tableName: combos
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: combo_price
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: start_date
                  type: TIMESTAMP
              - column:
                  name: end_date
                  type: TIMESTAMP
              - column:
                  name: active
                  type: BOOLEAN
                  constraints:
                    nullable: false

  - changeSet:
      id: 0011-4
      author: antigravity
      changes:
        - createTable:
            tableName: combo_items
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: combo_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_combo_items_combo
                    referencedTableName: combos
                    referencedColumnNames: id
              - column:
                  name: item_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: quantity
                  type: INT
                  constraints:
                    nullable: false

  - changeSet:
      id: 0011-5
      author: antigravity
      changes:
        - createTable:
            tableName: coupons
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: restaurant_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: discount_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: discount_value
                  type: DECIMAL(19, 2)
              - column:
                  name: free_item_id
                  type: UUID
              - column:
                  name: min_order_value
                  type: DECIMAL(19, 2)
              - column:
                  name: valid_date
                  type: DATE
              - column:
                  name: usage_limit
                  type: INT
              - column:
                  name: used_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: active
                  type: BOOLEAN
                  constraints:
                    nullable: false

  - changeSet:
      id: 0011-6
      author: antigravity
      changes:
        - createTable:
            tableName: coupon_rules
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: coupon_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_coupon_rules_coupon
                    referencedTableName: coupons
                    referencedColumnNames: id
              - column:
                  name: type
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: value
                  type: TEXT
                  constraints:
                    nullable: false
